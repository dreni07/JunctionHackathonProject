<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Piramida e Tiranës Logo</title>
  <desc>Pyramid logo with transparent background in green palette</desc>
  <defs>
    <linearGradient id="fl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgb(12,33,25)"/>
      <stop offset="100%" stop-color="rgb(20,55,41)"/>
    </linearGradient>
    <linearGradient id="fr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgb(38,110,73)"/>
      <stop offset="100%" stop-color="rgb(16,44,33)"/>
    </linearGradient>
    <linearGradient id="fc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgb(55,150,100)"/>
      <stop offset="100%" stop-color="rgb(20,55,41)"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgb(12,33,25)"/>
      <stop offset="50%" stop-color="rgb(38,110,73)"/>
      <stop offset="100%" stop-color="rgb(12,33,25)"/>
    </linearGradient>
    <linearGradient id="gl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgb(38,110,73)" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="rgb(38,110,73)" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Glow under pyramid -->
  <ellipse cx="340" cy="340" rx="140" ry="18" fill="url(#gl)"/>

  <!-- Left face -->
  <polygon points="340,90 175,338 340,295" fill="url(#fl)"/>
  <!-- Right face -->
  <polygon points="340,90 505,338 340,295" fill="url(#fr)"/>
  <!-- Center highlight -->
  <polygon points="340,90 310,215 370,215" fill="url(#fc)" opacity="0.45"/>

  <!-- Edges -->
  <line x1="340" y1="90" x2="175" y2="338" stroke="rgb(55,150,100)" stroke-width="1.2" opacity="0.6"/>
  <line x1="340" y1="90" x2="505" y2="338" stroke="rgb(55,150,100)" stroke-width="1.2" opacity="0.6"/>

  <!-- Base -->
  <rect x="175" y="336" width="330" height="5" rx="2.5" fill="url(#bg2)"/>

  <!-- Apex -->
  <circle cx="340" cy="88" r="5" fill="rgb(55,150,100)"/>
  <circle cx="340" cy="88" r="11" fill="none" stroke="rgb(38,110,73)" stroke-width="0.8" opacity="0.5"/>

  <!-- Rules -->
  <line x1="205" y1="374" x2="475" y2="374" stroke="rgb(38,110,73)" stroke-width="0.7"/>

  <!-- Title -->
  <text x="340" y="412" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="33" font-weight="700" letter-spacing="9"
    fill="rgb(55,150,100)">PIRAMIDA</text>

  <!-- Subtitle -->
  <text x="340" y="438" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="12" font-weight="400" letter-spacing="11"
    fill="rgb(38,110,73)">E TIRANËS</text>

  <line x1="205" y1="454" x2="475" y2="454" stroke="rgb(38,110,73)" stroke-width="0.7"/>

  <!-- Dots -->
  <circle cx="203" cy="412" r="2.5" fill="rgb(38,110,73)"/>
  <circle cx="477" cy="412" r="2.5" fill="rgb(38,110,73)"/>
</svg>
