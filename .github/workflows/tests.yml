name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Type Analysis
        run: composer types:check

      - name: Unit Tests
        run: php artisan test --testsuite=Unit

      - name: Feature Tests
        run: php artisan test --testsuite=Feature

  # Single, stable status check to mark as "required" in branch protection.
  # Succeeds only when every matrix job above (unit + feature on all PHP versions) passes.
  tests-passed:
    name: tests-passed
    runs-on: ubuntu-latest
    needs: tests
    if: always()
    steps:
      - name: Verify all test jobs succeeded
        run: |
          if [ "${{ needs.tests.result }}" != "success" ]; then
            echo "One or more unit/feature test jobs failed."
            exit 1
          fi
          echo "All unit and feature tests passed."
